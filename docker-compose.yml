# Local infra for S2 tiered-storage's LIVE tiers (operator directive
# 2026-07-10): `postgres` backs `PgTier`'s hot tier, `minio` (S3-
# compatible) backs `R2Tier`'s cold tier — both fully local, no cloud
# credentials. `crates/canon-store`'s `live-pg`/`live-r2` Cargo-feature
# integration tests target this stack via the `CANON_PG_DSN`/`CANON_S3_*`
# env contract (see `crates/canon-store/src/pg_tier.rs`/`r2_tier.rs`).
#
# Quick start:
#   docker compose up -d --wait postgres minio
#   docker compose up minio-init   # one-shot: creates the `canon` bucket
#   CANON_PG_DSN="postgres://canon:canon@127.0.0.1:55432/canon_v1" \
#   CANON_S3_ENDPOINT="http://127.0.0.1:59000" \
#   CANON_R2_BUCKET=canon CANON_S3_ACCESS_KEY=canon CANON_S3_SECRET_KEY=canoncanon \
#     cargo test -p canon-store --features live-pg,live-r2
#
# Every published port is overrideable (`CANON_PG_PORT`/`CANON_MINIO_PORT`/
# `CANON_MINIO_CONSOLE_PORT`) so this stack can run alongside another
# repo's own Postgres/MinIO on the same host.
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${CANON_PG_PORT:-55432}:5432"
    environment:
      POSTGRES_USER: canon
      POSTGRES_PASSWORD: canon
      POSTGRES_DB: canon_v1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canon -d canon_v1"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - canon-pg-data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    ports:
      - "${CANON_MINIO_PORT:-59000}:9000"
      - "${CANON_MINIO_CONSOLE_PORT:-59001}:9001"
    environment:
      MINIO_ROOT_USER: canon
      MINIO_ROOT_PASSWORD: canoncanon
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/ready"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - canon-minio-data:/data

  # One-shot: aliases this compose's `minio` and ensures the `canon`
  # bucket exists — `R2Tier::connect_live`'s docker-compose default
  # (`CANON_R2_BUCKET=canon`) targets exactly this bucket. Exits 0 once
  # done; `docker compose up -d --wait postgres minio` does not itself
  # wait on this one-shot (compose `--wait` only waits on services with
  # a healthcheck), so callers run `docker compose up minio-init`
  # (or `--wait` a healthy `postgres`/`minio` first) before assuming the
  # bucket is ready — see this file's own header comment / CI job.
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 canon canoncanon &&
      mc mb --ignore-existing local/canon
      "

volumes:
  canon-pg-data:
  canon-minio-data:
